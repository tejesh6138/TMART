<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopSphere | Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container nav">
      <a href="index.html" class="logo">ShopSphere</a>
      <button class="menu-toggle" id="menuToggle">☰</button>
      <nav id="navLinks" class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="login.html" class="active">Login</a>
        <a href="register.html">Register</a>
        <a href="cart.html" class="cart-link">Cart <span id="cartCount" class="badge">0</span></a>
      </nav>
    </div>
  </header>

  <section class="auth-section">
    <div class="auth-card">
      <h2>Login</h2>
      <p>Access your account to continue shopping</p>

      <form id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginEmail" required />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" required />
        </div>

        <button type="submit" class="btn btn-primary full-width">Login</button>
      </form>

      <p class="auth-switch">
        Don’t have an account? <a href="register.html">Register</a>
      </p>
    </div>
  </section>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
