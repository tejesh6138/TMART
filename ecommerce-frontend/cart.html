<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopSphere | Cart</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container nav">
      <a href="index.html" class="logo">ShopSphere</a>

      <button class="menu-toggle" id="menuToggle">☰</button>

      <nav id="navLinks" class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="wishlist.html">Wishlist</a>
        <a href="orders.html">Orders</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <a href="cart.html" class="cart-link active">Cart <span id="cartCount" class="badge">0</span></a>
      </nav>
    </div>
  </header>

  <section class="page-header">
    <div class="container">
      <h1>Your Cart</h1>
      <p>Review your selected items before checkout</p>
    </div>
  </section>

  <section class="section">
    <div class="container cart-layout">
      <div class="cart-items">
        <div id="cartItemsContainer"></div>
      </div>

      <div class="cart-summary">
        <h3>Order Summary</h3>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="subtotalAmount">₹0</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span>₹99</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="totalAmount">₹0</span>
        </div>
        <a href="checkout.html" class="btn btn-primary full-width">Proceed to Checkout</a>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-bottom">
      <p>© 2026 ShopSphere. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
