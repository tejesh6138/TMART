<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopSphere | Checkout</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container nav">
      <a href="index.html" class="logo">ShopSphere</a>

      <button class="menu-toggle" id="menuToggle">☰</button>

      <nav id="navLinks" class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="wishlist.html">Wishlist</a>
        <a href="orders.html">Orders</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <a href="cart.html" class="cart-link">Cart <span id="cartCount" class="badge">0</span></a>
      </nav>
    </div>
  </header>

  <section class="page-header">
    <div class="container">
      <h1>Checkout</h1>
      <p>Enter shipping and payment details</p>
    </div>
  </section>

  <section class="section">
    <div class="container checkout-layout">
      <form id="checkoutForm" class="checkout-form card">
        <h3>Shipping Details</h3>

        <div class="form-grid">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fullName" required />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required />
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="text" id="phone" required />
          </div>
          <div class="form-group">
            <label>City</label>
            <input type="text" id="city" required />
          </div>
          <div class="form-group full">
            <label>Address</label>
            <textarea id="address" rows="4" required></textarea>
          </div>
          <div class="form-group">
            <label>Pincode</label>
            <input type="text" id="pincode" required />
          </div>
          <div class="form-group">
            <label>Payment Method</label>
            <select id="paymentMethod" required>
              <option value="cod">Cash on Delivery</option>
              <option value="upi">UPI</option>
              <option value="card">Card</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn btn-primary">Place Order</button>
      </form>

      <div class="cart-summary">
        <h3>Order Summary</h3>
        <div id="checkoutSummary"></div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-bottom">
      <p>© 2026 ShopSphere. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
